version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: medo-postgres
    environment:
      POSTGRES_DB: medo
      POSTGRES_USER: medo
      POSTGRES_PASSWORD: medo_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  medo-api:
    build: .
    container_name: medo-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: medo
      DB_USER: medo
      DB_PASS: medo_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: medo_jwt_secret_key_must_be_at_least_32_chars_long_for_security
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
